[package]
name = "spindll"
version = "0.1.0"
edition = "2024"
description = "A Rust-native GGUF inference engine with model management"
license = "Apache-2.0"

[dependencies]
# Async runtime (like Python's asyncio event loop)
tokio = { version = "1", features = ["full"] }
tokio-stream = "0.1"

# gRPC framework
tonic = "0.13"
prost = "0.13"

# CLI argument parsing (like Python's argparse)
clap = { version = "4", features = ["derive"] }

# HuggingFace model downloads
hf-hub = "0.4"

# llama.cpp inference
llama-cpp-2 = "0.1"
encoding_rs = "0.8"

# HTTP client (for Ollama registry pulls)
reqwest = { version = "0.12", features = ["blocking"] }
indicatif = "0.17"

# Serialization (like Python's json/dataclasses)
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"

# Logging (like Python's logging module)
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# System info (RAM/VRAM detection)
sysinfo = "0.35"

# Error handling (like Python's custom exception classes, but better)
thiserror = "2"
anyhow = "1"

[build-dependencies]
# Compiles .proto files to Rust code at build time
tonic-build = "0.13"
