name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  check-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Skip superseded RC tags
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if echo "$TAG_NAME" | grep -qE '\-rc\.[0-9]+$'; then
            RC_NUM=$(echo "$TAG_NAME" | grep -oE '[0-9]+$')
            PREFIX=$(echo "$TAG_NAME" | sed 's/-rc\.[0-9]*$//')
            LATEST=$(git tag -l "${PREFIX}-rc.*" | grep -oE '[0-9]+$' | sort -n | tail -1)
            if [ "$RC_NUM" -lt "$LATEST" ]; then
              echo "::notice::Skipping $TAG_NAME — newer RC ${PREFIX}-rc.${LATEST} exists"
              exit 1
            fi
          fi

      - name: Verify Cargo.toml version matches tag
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          CARGO_VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          TAG_VERSION=$(echo "$TAG_NAME" | sed 's/^v//; s/-rc\.[0-9]*$//')
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match Cargo.toml version ($CARGO_VERSION)"
            exit 1
          fi
          echo "Version match: v$CARGO_VERSION"

  test:
    needs: check-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake protobuf-compiler

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --features cli,http

