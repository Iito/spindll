  build-macos:
    name: macOS ARM (Sequoia)
    needs: test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: brew install protobuf

      - uses: Swatinem/rust-cache@v2
        with:
          key: macos-arm64

      - name: Build
        run: cargo build --release --features cli,http,mlx

      - name: Package binary
        shell: bash
        run: |
          mkdir -p dist
          cp target/release/spindll dist/
          cd dist
          tar czf "spindll-aarch64-apple-darwin.tar.gz" spindll
          rm spindll

      - uses: actions/upload-artifact@v4
        with:
          name: spindll-aarch64-apple-darwin
          path: dist/spindll-aarch64-apple-darwin.tar.gz

