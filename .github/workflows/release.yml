name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  check-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify Cargo.toml version matches tag
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          CARGO_VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          TAG_VERSION=$(echo "$TAG_NAME" | sed 's/^v//; s/-rc\.[0-9]*$//')
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match Cargo.toml version ($CARGO_VERSION)"
            exit 1
          fi
          echo "Version match: v$CARGO_VERSION"

  test:
    needs: check-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake protobuf-compiler

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --features cli,http

  build:
    needs: test
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y cmake protobuf-compiler

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf

      - name: Install protoc (Windows)
        if: runner.os == 'Windows'
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build (macOS with MLX)
        if: runner.os == 'macOS'
        run: cargo build --release --features cli,http,mlx

      - name: Build
        if: runner.os != 'macOS'
        run: cargo build --release --features cli,http

      - name: Package binary
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: |
          mkdir -p dist
          if [ -f target/release/spindll.exe ]; then
            cp target/release/spindll.exe dist/
            cd dist
            7z a "spindll-${TARGET}.zip" spindll.exe
            rm spindll.exe
          else
            cp target/release/spindll dist/
            cd dist
            tar czf "spindll-${TARGET}.tar.gz" spindll
            rm spindll
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: spindll-${{ matrix.target }}
          path: dist/spindll-*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Detect release type
        id: meta
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if echo "$TAG_NAME" | grep -qE '\-rc\.[0-9]+$'; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            VERSION_PREFIX=$(echo "$TAG_NAME" | sed 's/-rc\.[0-9]*$//')
            echo "version_prefix=$VERSION_PREFIX" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Replace previous RC pre-release
        if: steps.meta.outputs.prerelease == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
          VERSION_PREFIX: ${{ steps.meta.outputs.version_prefix }}
        run: |
          PREV_BODY=""
          EXISTING=$(gh release list --json tagName,isPrerelease \
            --jq ".[] | select(.isPrerelease and (.tagName | startswith(\"${VERSION_PREFIX}-rc.\"))) | .tagName")
          for OLD_TAG in $EXISTING; do
            if [ "$OLD_TAG" != "$TAG_NAME" ]; then
              echo "Capturing notes from previous RC: $OLD_TAG"
              PREV_BODY=$(gh release view "$OLD_TAG" --json body --jq '.body')
              echo "Deleting previous RC release: $OLD_TAG"
              gh release delete "$OLD_TAG" --yes
            fi
          done
          echo "$PREV_BODY" > /tmp/prev_rc_body.md

      - name: Create RC pre-release
        if: steps.meta.outputs.prerelease == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          PREV_BODY=$(cat /tmp/prev_rc_body.md 2>/dev/null || true)
          if [ -n "$PREV_BODY" ]; then
            # Generate notes for the new RC, then prepend previous RC notes.
            NEW_NOTES=$(gh api repos/{owner}/{repo}/releases/generate-notes \
              -f tag_name="$TAG_NAME" --jq '.body')
            COMBINED=$(printf '%s\n\n---\n\n%s' "$PREV_BODY" "$NEW_NOTES")
            gh release create "$TAG_NAME" \
              --title "$TAG_NAME" \
              --notes "$COMBINED" \
              --prerelease \
              artifacts/spindll-*
          else
            gh release create "$TAG_NAME" \
              --title "$TAG_NAME" \
              --generate-notes \
              --prerelease \
              artifacts/spindll-*
          fi

      - name: Create release
        if: steps.meta.outputs.prerelease == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "$TAG_NAME" \
            --title "$TAG_NAME" \
            --generate-notes \
            artifacts/spindll-*
