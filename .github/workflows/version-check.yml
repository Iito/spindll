name: Version Bump Check

on:
  pull_request:
    branches: [main]

jobs:
  check-version-bump:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check version bump
        run: |
          CHANGED_FILES=$(git diff --name-only origin/main...HEAD)

          SRC_CHANGED=false
          for file in $CHANGED_FILES; do
            case "$file" in
              src/*|proto/*|Cargo.toml|Cargo.lock|build.rs)
                SRC_CHANGED=true
                ;;
            esac
          done

          if [ "$SRC_CHANGED" = "false" ]; then
            echo "No source changes detected, skipping version check."
            exit 0
          fi

          PR_VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          MAIN_VERSION=$(git show origin/main:Cargo.toml | grep '^version = ' | head -1 | sed 's/version = "\(.*\)"/\1/')

          if [ "$PR_VERSION" = "$MAIN_VERSION" ]; then
            echo "::error::Source files changed but version was not bumped (still $MAIN_VERSION). Please bump the version in Cargo.toml."
            exit 1
          fi

          echo "Version bumped: $MAIN_VERSION → $PR_VERSION"
